 <input type="text" id="searchInput" onkeyup="searchResources()" placeholder="Search resources..." style="padding:10px; width:100%; margin-bottom:10px;">
 <h1>Resource Index</h1>

<div id="resourceList">

  <a href="https://developer.mozilla.org">JavaScript Resource</a><br>
  <a href="https://www.python.org">Python Resource</a><br>

</div>
<script>
function searchResources() {
    let input = document.getElementById("searchInput");
    let filter = input.value.toLowerCase();
    let list = document.getElementById("resourceList");
    let items = list.getElementsByTagName("a");

    for (let i = 0; i < items.length; i++) {
        let text = items[i].textContent || items[i].innerText;

        if (text.toLowerCase().indexOf(filter) > -1) {
            items[i].style.display = "";
        } else {
            items[i].style.display = "none";
        }
    }
}
</script>
