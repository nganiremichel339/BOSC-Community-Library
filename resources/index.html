<select id="languageSelect" onchange="changeLanguage()">
    <option value="en">English</option>
    <option value="fr">French</option>
</select>

<script>
    const translations = {
    en: {
        title: "Resource Index",
        search: "Search Resources"
    },
    fr: {
        title: "Index des ressources",
        search: "Rechercher des ressources"
    }
};
function changeLanguage() {
    let lang = document.getElementById("languageSelect").value;

    document.getElementById("title").innerText = translations[lang].title;
    document.getElementById("searchLabel").innerText = translations[lang].search;
}
function searchResources() {
    let input = document.getElementById("searchBox").value.toLowerCase();
    let items = document.querySelectorAll(".resource-item");

    items.forEach(item => {
        let text = item.textContent.toLowerCase();
        item.style.display = text.includes(input) ? "block" : "none";
        function searchResources() {
    let input = document.getElementById("searchInput").value.toLowerCase();
    let items = document.getElementsByClassName("resource-item");

    for (let i = 0; i < items.length; i++) {
        let text = items[i].innerText.toLowerCase();
        items[i].style.display = text.includes(input) ? "" : "none";
    }
}
    });
}

document.getElementById("searchBox").addEventListener("keyup", searchResources);
</script>
